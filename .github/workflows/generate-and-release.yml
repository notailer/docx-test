name: Generate DOCX and Create Release
# Give the workflow write permission to repo contents (needed for tags/releases)
permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      # Optional: set PAT secret name if GITHUB_TOKEN cannot push in your org
      PUSH_TOKEN_SECRET: "RELEASE_TOKEN"   # set repo secret RELEASE_TOKEN to a PAT if needed

    steps:
      - name: Checkout repository (fetch all history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || true
          npm install docx

      - name: Generate DOCX
        run: |
          # assume generate_ultimate_docx.mjs exists and produces ultimate_docx_test_file.docx
          node generate_ultimate_docx.mjs
        env:
          CI: true

      - name: Determine tag
        id: tag
        run: |
          # Use unique tag based on run id to avoid collisions (github.run_id is unique per workflow run)
          echo "TAG=v${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Create and push tag (if not exists)
        if: always()
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
          PUSH_TOKEN: ${{ secrets[env.PUSH_TOKEN_SECRET] || github.token }}
        run: |
          echo "Using tag: $TAG"
          # Check if tag exists remotely
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag already exists on remote: $TAG"
          else
            git config user.name "${{ github.actor }} (actions)"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git tag -a "$TAG" -m "Generated tag $TAG by workflow"
            # Use PAT if provided, otherwise GITHUB_TOKEN (may be restricted in some orgs)
            if [ -n "${PUSH_TOKEN}" ]; then
              git push https://${PUSH_TOKEN}@${{ github.server_url#https:// | replace('https://','') }}/${{ github.repository }} refs/tags/$TAG
            else
              git push origin refs/tags/$TAG
            fi
          fi

      - name: Create Release (skip if exists)
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.TAG }}
          name: "Ultimate DOCX ${{ steps.tag.outputs.TAG }}"
          body: "Automated DOCX generated by workflow"
          skipIfReleaseExists: true
        # if ncipollo needs explicit token input to use PAT:
        # with:
        #   token: ${{ secrets.RELEASE_TOKEN }}    # uncomment if you want PAT usage

      - name: Upload Release Asset
        if: always()
        uses: softprops/action-gh-release@v1
        with:
          files: ultimate_docx_test_file.docx
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
