name: Generate DOCX and Create Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || true
          npm install docx

      - name: Generate DOCX
        run: |
          node generate_ultimate_docx.mjs

      - name: Create tag value
        id: tag
        run: |
          echo "TAG=v${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Show tag
        run: |
          echo "Tag = ${{ steps.tag.outputs.TAG }}"

      - name: Create and push tag
        run: |
          TAG=${{ steps.tag.outputs.TAG }}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.TAG }}
          name: "Ultimate DOCX ${{ steps.tag.outputs.TAG }}"
          body: "Automated DOCX generated by workflow"

      - name: Upload DOCX
        uses: softprops/action-gh-release@v1
        with:
          files: ultimate_docx_test_file.docx