name: Generate DOCX and Create Release

# 권한: release/tag 생성, assets 업로드 등을 위해 contents: write 필요
permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      # Optional: set this secret name to a PAT if GITHUB_TOKEN cannot push in your org
      PUSH_TOKEN_SECRET: "RELEASE_TOKEN"

    steps:
      - name: Checkout repository (fetch all history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # persist-credentials true (default) so git push uses GITHUB_TOKEN by default

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || true
          npm install docx

      - name: Generate DOCX
        run: |
          node generate_ultimate_docx.mjs
        env:
          CI: true

      - name: Determine tag
        id: tag
        run: |
          echo "TAG=v${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Create and push tag (if not exists)
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          echo "Using tag: $TAG"
          # check remote tags
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag already exists on remote: $TAG"
          else
            git config user.name "${{ github.actor }} (actions)"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git tag -a "$TAG" -m "Generated tag $TAG by workflow"
            # push using configured origin credentials (actions/checkout persists credentials)
            git push origin refs/tags/$TAG
          fi

      - name: Create Release (skip if exists)
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.TAG }}
          name: "Ultimate DOCX ${{ steps.tag.outputs.TAG }}"
          body: "Automated DOCX generated by workflow"
          skipIfReleaseExists: true

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ultimate_docx_test_file.docx
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
