permissions:
  contents: write     # release (upload assets) / create release need write access to repo contents
  packages: write     # if uploading packages
  pull-requests: write
  

name: Generate DOCX and Create Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || true
          npm install docx

      - name: Generate DOCX
        run: |
          node generate_ultimate_docx.mjs
        env:
          CI: true

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_id }}
          name: "Ultimate DOCX v${{ github.run_id }}"
          body: "Automated DOCX generated by workflow"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ultimate_docx_test_file.docx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
