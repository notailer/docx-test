name: Generate DOCX and Create Release (robust)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      # 만약 조직에서 GITHUB_TOKEN으로 push가 제한된다면:
      # 1) 개인 PAT 생성(repo 권한 포함)
      # 2) repo Settings → Secrets → New repository secret 이름을 RELEASE_TOKEN으로 설정
      # 3) 아래 REPO_USE_PAT 값을 "true"로 바꿈
      REPO_USE_PAT: "false"
      REPO_PAT_SECRET_NAME: "RELEASE_TOKEN"

    steps:
      - name: Checkout repository (full history & tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || true
          npm install docx

      - name: Generate DOCX
        run: |
          node generate_ultimate_docx.mjs
        env:
          CI: true

      - name: Determine tag
        id: tag
        run: |
          echo "TAG=v${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Debug: show resolved tag and list files
        run: |
          echo "Resolved TAG: ${{ steps.tag.outputs.TAG }}"
          echo "Workspace files:"
          ls -la

      - name: Ensure tag exists and push it (if not present)
        id: push_tag
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          set -e
          echo "Ensuring tag: $TAG"
          # show remotes for debugging
          git remote -v
          # check if remote tag exists
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on remote."
          else
            git config user.name "${{ github.actor }} (actions)"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git tag -a "${TAG}" -m "Generated tag ${TAG} by workflow"
            if [ "${REPO_USE_PAT}" = "true" ]; then
              echo "Using PAT from secret ${REPO_PAT_SECRET_NAME} to push tag"
              git push https://${{ secrets[ env.REPO_PAT_SECRET_NAME ] }}@github.com/${{ github.repository }} refs/tags/${TAG}
            else
              echo "Pushing tag using persisted credentials (GITHUB_TOKEN)"
              git push origin refs/tags/${TAG}
            fi
          fi
          echo "PUSH_OK=true" >> $GITHUB_OUTPUT

      - name: Create Release (official action)
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          release_name: "Ultimate DOCX ${{ steps.tag.outputs.TAG }}"
          body: Automated DOCX generated by workflow
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Debug: show create_release outputs
        run: |
          echo "create_release outputs:"
          echo "upload_url: ${{ steps.create_release.outputs.upload_url || 'NONE' }}"

      - name: Upload release asset (official)
        id: upload_asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ultimate_docx_test_file.docx
          asset_name: ultimate_docx_test_file.docx
          asset_content_type: application/vnd.openxmlformats-officedocument.wordprocessingml.document
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
