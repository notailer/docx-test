name: Generate DOCX and Create Release

# Release 생성/asset 업로드/태그 푸시를 위해 contents: write 필요
permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      # (선택) 조직에서 GITHUB_TOKEN으로 push가 제한되면 REPO_PAT라는 이름으로 PAT를 repo Secrets에 넣으세요.
      REPO_PAT_SECRET_NAME: "RELEASE_TOKEN"

    steps:
      - name: Checkout repository (full history & tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci || true
          npm install docx

      - name: Generate DOCX
        run: |
          # generate_ultimate_docx.mjs 가 repo 루트에 있어야 함
          node generate_ultimate_docx.mjs
        env:
          CI: true

      - name: Determine tag (unique)
        id: tag
        run: |
          # Use run id which is unique per workflow run
          echo "TAG=v${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Show tag (debug)
        run: |
          echo "Resolved TAG = ${{ steps.tag.outputs.TAG }}"

      - name: Create and push tag if not exists
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          echo "Creating/pushing tag: $TAG"
          # exit non-zero on failure
          set -e
          # ensure git origin is present
          git remote -v
          # check if tag already exists remotely
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on remote; skipping tag creation."
          else
            git config user.name "${{ github.actor }} (actions)"
            git config user.email "${{ github.actor }}@users.noreply.github.com"
            git tag -a "${TAG}" -m "Generated tag ${TAG} by workflow"
            # Try pushing with default credentials (persisted by actions/checkout)
            echo "Pushing tag to origin..."
            git push origin "refs/tags/${TAG}"
          fi

      - name: Create Release (skip if exists)
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.TAG }}
          name: "Ultimate DOCX ${{ steps.tag.outputs.TAG }}"
          body: "Automated DOCX generated by workflow"
          skipIfReleaseExists: true

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ultimate_docx_test_file.docx
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
